<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Control Estudiantil INEB</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="header">
<img src="logo.png" class="logo">
<div>
<h2>INEB</h2>
<h1>CONTROL ESTUDIANTIL</h1>
</div>
</div>

<div class="toolbar">

<button onclick="nuevo()">Nuevo</button>
<button onclick="guardar()">Guardar</button>
<button onclick="actualizar()">Actualizar</button>
<button onclick="borrar()">Archivar</button>

<input type="text" id="buscarCodigo" placeholder="Código estudiante">
<button onclick="buscar()">Buscar</button>

</div>

<form id="formulario">

<h3>DATOS DEL ESTUDIANTE</h3>

<div class="grid">
<input id="codigo" placeholder="Código personal">
<input id="nombre" placeholder="Nombres y apellidos">
<input id="edad" placeholder="Edad">
<input id="fechaNacimiento" type="date">
<input id="telefono" placeholder="Teléfono">
<input id="emergencia" placeholder="Teléfono emergencia">
<input id="genero" placeholder="Género">
<input id="enfermedad" placeholder="Enfermedad crónica">
<input id="grado" placeholder="Grado">
<input id="direccion" placeholder="Dirección">
</div>

<h3>DATOS DEL PADRE</h3>

<div class="grid">
<input id="padreNombre" placeholder="Nombre del padre">
<input id="padreDpi" placeholder="DPI padre">
<input id="padreTelefono" placeholder="Teléfono padre">
</div>

<h3>DATOS DE LA MADRE</h3>

<div class="grid">
<input id="madreNombre" placeholder="Nombre de la madre">
<input id="madreDpi" placeholder="DPI madre">
<input id="madreTelefono" placeholder="Teléfono madre">
</div>

<h3>ENCARGADO</h3>

<div class="grid">
<input id="encargadoNombre" placeholder="Nombre encargado">
<input id="encargadoDpi" placeholder="DPI encargado">
<input id="encargadoTelefono" placeholder="Teléfono encargado">
</div>

</form>

<script src="script.js"></script>

</body>
</html>
