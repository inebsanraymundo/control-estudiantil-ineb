<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Estudiantil INEB</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
background:#f5f6fa;
}

header{
background:#1e3a8a;
color:white;
padding:10px;
text-align:center;
font-weight:bold;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 0 4px rgba(0,0,0,.1);
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

input,select{
width:100%;
padding:6px;
margin-top:4px;
margin-bottom:8px;
border:1px solid #ccc;
border-radius:4px;
}

button{
background:#1e3a8a;
color:white;
border:none;
padding:8px 12px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#162d66;
}

.foto-preview{
width:120px;
height:140px;
border:1px solid #ccc;
object-fit:cover;
border-radius:4px;
}

</style>

</head>
<body>

<header>
CONTROL ESTUDIANTIL INEB
</header>

<div class="container">

<div class="card">

<div class="grid">

<input id="nombre" placeholder="Nombres y apellidos">
<input id="codigo" placeholder="Código personal">
<input id="edad" placeholder="Edad actual">

<input id="fecha" type="date" placeholder="Fecha nacimiento">
<input id="telefono" placeholder="Teléfono">
<input id="emergencia" placeholder="Tel. emergencia">

<select id="genero">
<option value="">Género</option>
<option>Masculino</option>
<option>Femenino</option>
</select>

<select id="enfermedad">
<option value="">¿Enfermedad crónica?</option>
<option>SI</option>
<option>NO</option>
</select>

<input id="detalle_enf" placeholder="Indique cual">

<select id="zurdo">
<option value="">Zurdo o diestro</option>
<option>Zurdo</option>
<option>Diestro</option>
</select>

<select id="grado">
<option value="">Grado a cursar</option>
<option>1A</option>
<option>1B</option>
<option>1C</option>
<option>1D</option>
<option>1E</option>
<option>1F</option>
<option>1G</option>
<option>2A</option>
<option>2B</option>
<option>2C</option>
<option>2D</option>
<option>2E</option>
<option>2F</option>
<option>2G</option>
<option>3A</option>
<option>3B</option>
<option>3C</option>
<option>3D</option>
<option>3E</option>
</select>

<input id="etnia" placeholder="Comunidad étnica">

<input id="direccion" placeholder="Dirección">
<input id="aldea" placeholder="Aldea o caserío">

<input id="padre" placeholder="Nombre del padre">
<input id="dpi_padre" placeholder="DPI padre">
<input id="tel_padre" placeholder="Tel padre">

<input id="madre" placeholder="Nombre madre">
<input id="dpi_madre" placeholder="DPI madre">
<input id="tel_madre" placeholder="Tel madre">

<select id="enc_padre">
<option value="">Encargado es padre</option>
<option>SI</option>
<option>NO</option>
</select>

<select id="enc_madre">
<option value="">Encargado es madre</option>
<option>SI</option>
<option>NO</option>
</select>

<input id="encargado" placeholder="Nombre encargado">
<input id="dpi_enc" placeholder="DPI encargado">
<input id="tel_enc" placeholder="Tel encargado">

<input id="dir_enc" placeholder="Dirección encargado">
<input id="aldea_enc" placeholder="Aldea encargado">
<input id="relacion" placeholder="Relación">

<input id="tel_extra" placeholder="Tel adicional">

</div>

<br>

<label>Fotografía</label>
<input type="file" id="foto" accept="image/*">
<br>
<img id="preview" class="foto-preview">

<br><br>

<button onclick="guardar()">Guardar</button>

</div>

</div>

<div id="credito-creador">
Sistema desarrollado por Lic. José Antonio Ortiz Corzo
</div>

<style>
#credito-creador{
position:fixed;
bottom:4px;
right:8px;
font-size:10px;
color:#777;
opacity:.55;
z-index:999999;
pointer-events:none;
user-select:none;
}
</style>

<script>

const API="https://script.google.com/macros/s/AKfycbx25_fsecpcURES_bHUTrCygTuwvReKAIMNP2yJ5oburrNAGjyuZLCyfulCDd7asHj4/exec"

document.getElementById("foto").addEventListener("change",function(e){

const file=e.target.files[0]
if(!file) return

const reader=new FileReader()

reader.onload=function(evt){
document.getElementById("preview").src=evt.target.result
}

reader.readAsDataURL(file)

})

async function guardar(){

const img=document.getElementById("preview").src
let base64=""

if(img){
base64=img.split(",")[1]
}

let fotoURL=""

if(base64){

const subida=await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"subirFoto",
data:{
base64:base64,
nombre:document.getElementById("nombre").value,
grado:document.getElementById("grado").value
}
})
})

const res=await subida.json()
fotoURL=res.url

}

await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"guardar",
data:{

nombre:nombre.value,
codigo:codigo.value,
edad:edad.value,
fecha:fecha.value,
telefono:telefono.value,
emergencia:emergencia.value,
genero:genero.value,
enfermedad:enfermedad.value,
detalle_enf:detalle_enf.value,
zurdo:zurdo.value,
grado:grado.value,
etnia:etnia.value,
direccion:direccion.value,
aldea:aldea.value,

padre:padre.value,
dpi_padre:dpi_padre.value,
tel_padre:tel_padre.value,

madre:madre.value,
dpi_madre:dpi_madre.value,
tel_madre:tel_madre.value,

enc_padre:enc_padre.value,
enc_madre:enc_madre.value,

encargado:encargado.value,
dpi_enc:dpi_enc.value,
tel_enc:tel_enc.value,
dir_enc:dir_enc.value,
aldea_enc:aldea_enc.value,
relacion:relacion.value,
tel_extra:tel_extra.value,

foto:fotoURL

}
})
})

alert("Guardado correctamente")

}

</script>

</body>
</html>
