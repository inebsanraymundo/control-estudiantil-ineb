<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Estudiantil INEB</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
background:#f5f6fa;
}

header{
background:#1e3a8a;
color:white;
padding:10px;
text-align:center;
font-weight:bold;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 0 4px rgba(0,0,0,.1);
margin-bottom:10px;
}

input,select{
width:100%;
padding:6px;
margin-top:4px;
margin-bottom:8px;
border:1px solid #ccc;
border-radius:4px;
}

button{
background:#1e3a8a;
color:white;
border:none;
padding:8px 12px;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#162d66;
}

.foto-preview{
width:120px;
height:140px;
border:1px solid #ccc;
object-fit:cover;
border-radius:4px;
}

</style>

</head>
<body>

<header>
CONTROL ESTUDIANTIL INEB
</header>

<div class="container">

<div class="card">

<label>Nombre completo</label>
<input type="text" id="nombre">

<label>Código</label>
<input type="text" id="codigo">

<label>Grado</label>
<select id="grado">
<option value="">Seleccione</option>
<option>1A</option>
<option>1B</option>
<option>1C</option>
<option>1D</option>
<option>1E</option>
<option>1F</option>
<option>1G</option>

<option>2A</option>
<option>2B</option>
<option>2C</option>
<option>2D</option>
<option>2E</option>
<option>2F</option>
<option>2G</option>

<option>3A</option>
<option>3B</option>
<option>3C</option>
<option>3D</option>
<option>3E</option>
</select>

<label>Fotografía</label>
<input type="file" id="foto" accept="image/*">

<img id="preview" class="foto-preview">

<br><br>

<button onclick="guardar()">Guardar</button>

</div>

</div>

<!-- =========================
     CREADOR DEL SISTEMA
     NO ELIMINAR
========================= -->

<div id="credito-creador">
Sistema desarrollado por Lic. José Antonio Ortiz Corzo
</div>

<style>
#credito-creador{
position:fixed;
bottom:4px;
right:8px;
font-size:10px;
color:#777;
opacity:.55;
z-index:999999;
pointer-events:none;
user-select:none;
font-family:Arial, Helvetica, sans-serif;
letter-spacing:.3px;
}
</style>

<script>

const API="ttps://script.google.com/macros/s/AKfycbx25_fsecpcURES_bHUTrCygTuwvReKAIMNP2yJ5oburrNAGjyuZLCyfulCDd7asHj4/exec"



document.getElementById("foto").addEventListener("change",function(e){

const file=e.target.files[0]

if(!file) return

const reader=new FileReader()

reader.onload=function(evt){
document.getElementById("preview").src=evt.target.result
}

reader.readAsDataURL(file)

})



async function guardar(){

const nombre=document.getElementById("nombre").value
const codigo=document.getElementById("codigo").value
const grado=document.getElementById("grado").value
const img=document.getElementById("preview").src

let base64=""

if(img){
base64=img.split(",")[1]
}

let fotoURL=""

if(base64){

const subida=await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"subirFoto",
data:{
base64:base64,
nombre:nombre,
grado:grado
}
})
})

const res=await subida.json()
fotoURL=res.url

}

await fetch(API,{
method:"POST",
body:JSON.stringify({
action:"guardar",
data:{
nombre:nombre,
codigo:codigo,
grado:grado,
foto:fotoURL
}
})
})

alert("Guardado correctamente")

}

</script>

</body>
</html>
