<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Estudiantil INEB San Raymundo</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<img src="logo.png" class="logo">
<div>
<h1>CONTROL ESTUDIANTIL</h1>
<h2>INEB SAN RAYMUNDO</h2>
</div>
</header>

<div class="container">

<section class="card">
<h3>DATOS PERSONALES DEL ESTUDIANTE</h3>

<input id="nombre" placeholder="Apellidos y nombres">
<input id="codigo" placeholder="Código personal">

<div class="grid">
<input id="edad" placeholder="Edad">
<input id="fecha" placeholder="Fecha nacimiento">
<input id="telefono" placeholder="Teléfono">
<input id="emergencia" placeholder="Tel emergencia">
<input id="genero" placeholder="Género">
<input id="grado" placeholder="Grado">
</div>

</section>

<section class="buttons">

<button onclick="guardar()">Guardar</button>
<button onclick="buscar()">Buscar</button>
<button onclick="actualizar()">Actualizar</button>
<button onclick="borrar()">Borrar</button>
<button onclick="imprimir()">Imprimir</button>

</section>

</div>

<script src="config.js"></script>
<script src="api.js"></script>
<script src="app.js"></script>

</body>
</html>
