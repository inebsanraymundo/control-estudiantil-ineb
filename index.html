<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Control Estudiantil INEB</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="header">
<img src="logo.png" class="logo">
<div>
<h2>INEB</h2>
<h1>CONTROL ESTUDIANTIL</h1>
</div>
</div>

<div class="toolbar">

<button onclick="nuevo()">🆕 Nuevo</button>
<button onclick="guardar()">💾 Guardar</button>
<button onclick="actualizar()">✏️ Actualizar</button>
<button onclick="borrar()">🗄️ Archivar</button>
<button onclick="limpiar()">🧹 Limpiar</button>

<input type="text" id="buscarCodigo" placeholder="Código estudiante">
<button onclick="buscar()">🔎 Buscar</button>

</div>

<form id="formulario" autocomplete="off">

<h3>DATOS DEL ESTUDIANTE</h3>

<div class="contenedor-estudiante">

<div class="datos-estudiante">

<div class="grid">

<input id="codigo" placeholder="Código personal">

<input id="nombre" placeholder="Nombres y apellidos">

<input id="grado" list="listaGrados" placeholder="Grado (ej: 1A)">

<datalist id="listaGrados">
<option value="1A">
<option value="1B">
<option value="1C">
<option value="1D">
<option value="1E">
<option value="1F">
<option value="1G">

<option value="2A">
<option value="2B">
<option value="2C">
<option value="2D">
<option value="2E">
<option value="2F">
<option value="2G">

<option value="3A">
<option value="3B">
<option value="3C">
<option value="3D">
<option value="3E">
</datalist>

<select id="genero">
<option value="">Género</option>
<option>Masculino</option>
<option>Femenino</option>
</select>

<input id="edad" type="number" placeholder="Edad">

<input id="fechaNacimiento" type="date">

<input id="telefono" type="tel" placeholder="Teléfono">

<input id="emergencia" type="tel" placeholder="Teléfono emergencia">

<input id="enfermedad" placeholder="Enfermedad crónica">

<input id="direccion" placeholder="Dirección">

</div>

</div>

<div class="foto-box">

<img id="previewFoto" class="foto">

<input type="file" id="foto" accept="image/*">

<input type="hidden" id="fotoURL">

</div>

</div>

<h3>DATOS DEL PADRE</h3>

<div class="grid">
<input id="padreNombre" placeholder="Nombre del padre">
<input id="padreDpi" placeholder="DPI padre">
<input id="padreTelefono" type="tel" placeholder="Teléfono padre">
</div>

<h3>DATOS DE LA MADRE</h3>

<div class="grid">
<input id="madreNombre" placeholder="Nombre de la madre">
<input id="madreDpi" placeholder="DPI madre">
<input id="madreTelefono" type="tel" placeholder="Teléfono madre">
</div>

<h3>ENCARGADO</h3>

<div class="grid">
<input id="encargadoNombre" placeholder="Nombre encargado">
<input id="encargadoDpi" placeholder="DPI encargado">
<input id="encargadoTelefono" type="tel" placeholder="Teléfono encargado">
</div>

</form>

<script src="script.js"></script>

</body>
</html>
