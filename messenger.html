<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSN Messenger Retro</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --msn-blue: #004b91;
      --msn-light-blue: #e1e9f3;
      --msn-header-blue: #0056b3;
      --msn-border: #a2b1c1;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Tahoma', sans-serif;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    .msn-container {
      width: 100%;
      height: 100%;
      background: var(--msn-light-blue);
      border: 1px solid var(--msn-border);
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .msn-header {
      background: linear-gradient(to bottom, #0078d7, #0056b3);
      color: white;
      padding: 4px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }

    .user-info {
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #c0cedd;
      background: linear-gradient(to bottom, #fcfdfe, #e1e9f3);
    }

    .avatar-frame {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      /* Redondeado ajustado */
      border: 2px solid white;
      /* Borde interior blanco */
      outline: 1px solid #ccc;
      /* Contorno exterior gris simulando 3D */
      overflow: hidden;
      /* Mantener imagen adentro */
      flex-shrink: 0;
      background: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .avatar-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .user-name-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .user-name {
      font-weight: bold;
      color: var(--msn-blue);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .msn-main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .chat-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 8px;
      background: white;
    }

    .chat-history {
      flex: 1;
      border: 1px solid var(--msn-border);
      background: white;
      overflow-y: auto;
      padding: 8px;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .writing-area {
      height: 60px;
      border: 1px solid var(--msn-border);
    }

    .writing-area textarea {
      width: 100%;
      height: 100%;
      border: none;
      resize: none;
      padding: 5px;
      font-family: inherit;
      outline: none;
      box-sizing: border-box;
    }

    .contacts-side {
      width: 170px;
      border-left: 1px solid var(--msn-border);
      background: #fbfcfe;
      padding: 5px;
      overflow-y: auto;
    }

    @media (max-width: 600px) {
      .contacts-side { width: 130px; }
      .footer-actions { padding: 12px 8px; gap: 4px; }
      .btn-nudge, .btn-send { padding: 8px 10px; font-size: 10px; }
      .avatar-frame { width: 50px; height: 50px; }
    }

    .contacts-title {
      font-weight: bold;
      font-size: 11px;
      color: #555;
      margin-bottom: 8px;
      border-bottom: 1px solid #eee;
    }

    .contact-item {
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 6px;
    }

    .contact-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      flex-shrink: 0;
    }

    .footer-actions {
      padding: 8px;
      display: flex;
      gap: 8px;
      background: #e1e9f3;
      border-top: 1px solid #c0cedd;
    }

    .btn-nudge,
    .btn-send {
      padding: 4px 12px;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 3px;
    }

    .btn-nudge {
      background: linear-gradient(to bottom, #fff, #e0e0e0);
      border: 1px solid #a0a0a0;
    }

    .btn-send {
      background: linear-gradient(to bottom, #86d26d, #4e9e36);
      color: white;
      border: 1px solid #3d7d2a;
      margin-left: auto;
    }

    .msg-entry {
      margin-bottom: 8px;
      display: flex;
      gap: 8px;
      align-items: flex-start;
      animation: fadeIn 0.3s forwards;
    }

    .msg-avatar {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 1px solid white;
      outline: 1px solid #ccc;
      background: none;
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .msg-avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .msg-text {
      padding: 5px 8px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      word-break: break-word;
      max-width: 75%;
    }

    /* Bubble: mensaje propio (derecha) */
    .msg-me {
      flex-direction: row-reverse;
      margin-left: auto;
    }
    .msg-me .msg-text {
      background: #dbeafe;
      border-color: #93c5fd;
      border-radius: 14px 4px 14px 14px;
      text-align: right;
    }
    .msg-me .msg-sender { text-align: right; }

    /* Bubble: mensaje ajeno (izquierda) */
    .msg-them .msg-text {
      background: #f1f5f9;
      border-color: #e2e8f0;
      border-radius: 4px 14px 14px 14px;
    }

    .has-new-msg {
      background: #fff3cd;
      animation: blink 1s infinite;
      padding: 2px;
      border-radius: 4px;
    }

    @keyframes blink {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }

      100% {
        opacity: 1;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-nudge {
      text-align: center;
      padding: 5px;
      background: #fff5f5;
      border: 1px dashed #feb2b2;
      color: #c53030;
      font-weight: bold;
      font-size: 11px;
      margin: 10px 0;
      border-radius: 4px;
    }

    .nudge-vibration {
      animation: nudge-anim 0.08s infinite;
    }

    @keyframes nudge-anim {
      0% {
        transform: translate(3px, 3px);
      }

      50% {
        transform: translate(-3px, -3px);
      }

      100% {
        transform: translate(3px, 3px);
      }
    }

    .nudge-flash {
      background-color: #ff000022 !important;
    }

    .avatar-gallery {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      border: 2px solid var(--msn-blue);
      padding: 15px;
      z-index: 1000;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border-radius: 8px;
      width: 210px;
    }

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .avatar-option {
      width: 40px;
      height: 40px;
      cursor: pointer;
      border: 1px solid #ddd;
      padding: 2px;
      object-fit: contain;
    }

    .avatar-option:hover {
      border-color: var(--msn-blue);
      background: #eee;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 999;
    }

    .status-select {
      font-size: 9px;
      border: 1px solid #a2b1c1;
      background: white;
      cursor: pointer;
      outline: none;
    }

    .personal-msg-area {
      display: flex;
      align-items: center;
      gap: 5px;
      width: 100%;
    }

    .personal-msg-input {
      border: 1px solid transparent;
      background: transparent;
      font-size: 10px;
      color: #555;
      flex: 1;
      font-style: italic;
      outline: none;
      padding: 1px;
    }

    .personal-msg-input:hover,
    .personal-msg-input:focus {
      border-color: #ccc;
      background: white;
    }

    .music-btn {
      padding: 0;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      filter: grayscale(1);
      transition: 0.3s;
    }

    .music-btn.active {
      filter: grayscale(0);
      transform: scale(1.1);
    }

    .music-input {
      display: none;
      font-size: 9px;
      border: 1px solid #2563eb;
      color: #2563eb;
      outline: none;
      width: 120px;
      padding: 1px 4px;
    }

    .music-text-global {
      font-size: 9px;
      color: #2563eb;
      padding-left: 13px;
      display: flex;
      align-items: center;
      gap: 3px;
    }
  </style>
</head>

<body>
  <div id="msnWindow" class="msn-container">
    <div class="msn-header">
      <span style="display:flex; align-items:center; gap:6px;">
        <img src="msn_icon.png" style="width:18px; height:18px; object-fit:contain;" alt="MSN">
        <span style="font-size: 11px; font-weight: bold;">Messenger - Control Estudiantil</span>
      </span>
      <div style="display:flex; gap:5px; align-items:center;">
        <button onclick="vaciarChat()"
          style="background:#ef4444; color:white; border:none; padding:2px 8px; font-size:9px; border-radius:10px; cursor:pointer;"
          title="Limpiar chat activo">🗑️ Vaciar Chat</button>
        <button onclick="window.close()"
          style="background:none; border:none; color:white; cursor:pointer; font-weight:bold; font-size:14px;">×</button>
      </div>
    </div>
    <div class="user-info">
      <div class="avatar-frame" onclick="openGallery()" title="Cambiar mi imagen" style="cursor:pointer;">
        <img id="myAvatarImg" src="msn_icon.png" alt="MSN">
      </div>
      <div class="user-name-area">
        <div class="user-name">
          <div id="statusDot" class="contact-status"></div>
          <span id="selfName">Cargando...</span>
        </div>
        <div class="personal-msg-area">
          <input type="text" id="personalMsg" class="personal-msg-input" placeholder="Mensaje personal..."
            onblur="updatePresence()">
          <button id="btnMusic" class="music-btn" style="display:none !important;" onclick="toggleMusic()"
            title="Lo que estoy escuchando">🎵</button>
          <input type="text" id="musicInput" class="music-input" placeholder="Canción - Artista" onblur="saveMusic()">
        </div>
        <select id="statusSelect" class="status-select" onchange="changeStatus()" style="margin-top:3px; align-self:flex-start;">
          <option value="online">Disponible</option>
          <option value="busy">Ocupado</option>
          <option value="away">Ausente</option>
        </select>
      </div>
    </div>
    <div class="msn-main-layout">
      <div class="chat-side">
        <div id="chatHistory" class="chat-history"></div>
        <div class="writing-area">
          <textarea id="msgInput" placeholder="Escribe aquí..."></textarea>
        </div>
      </div>
      <div class="contacts-side">
        <div class="contacts-title">Contactos</div>
        <div id="onlineList"></div>
      </div>
    </div>
    <div class="footer-actions">
      <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,image/*,video/*,audio/*" style="display:none" onchange="manejarArchivo(this)">
      <button class="btn-nudge" onclick="document.getElementById('fileInput').click()">📎 Archivo</button>
      <button class="btn-nudge" onclick="sendNudge()">🔔 Zumbido</button>
      <button class="btn-send" onclick="sendMsg()">Enviar</button>
    </div>
    <div
      style="text-align:center; font-size:8px; color:#94a3b8; padding:4px 8px; border-top:1px solid #e2e8f0; background:#f8fafc; border-radius:0 0 6px 6px;">
      © 2025 Desarrollado por <strong style="color:#64748b;">José Antonio Ortiz Corzo</strong> &nbsp;|&nbsp; INEB San
      Raymundo
    </div>
  </div>
  <div id="overlay" class="overlay" onclick="closeGallery()"></div>
  <div id="avatarGallery" class="avatar-gallery">
    <div
      style="font-size:12px; font-weight:bold; color:var(--msn-blue); border-bottom:1px solid #eee; padding-bottom:5px;">
      Elige tu imagen:</div>
    <div class="avatar-grid" id="avatarGrid"></div>
    <div style="margin-top:10px; border-top:1px solid #eee; padding-top:8px;">
      <label style="font-size:10px; color:#666; display:block; margin-bottom:4px;">O elige una foto de tu PC:</label>
      <input type="file" id="customAvatarInput" accept="image/*" style="font-size:10px; width:100%; border:1px solid #ccc; padding:2px; border-radius:4px;" onchange="uploadCustomAvatar(this)">
    </div>
    <button onclick="closeGallery()" style="width:100%; margin-top:10px; font-size:10px; cursor:pointer; background:#f5f5f5; border:1px solid #ddd; border-radius:4px; padding:4px;">Cerrar</button>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw3iWphkvmtDuDTxS8Uy0UVVHV6EzWAvligf4wxXkKOQUIeBKivYLgJ6cdthFUoBG8_/exec";
    const AVATARS = [
      "msn_icon.png", "https://cdn-icons-png.flaticon.com/512/3306/3306613.png", "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
      "https://cdn-icons-png.flaticon.com/128/2928/2928158.png", "https://cdn-icons-png.flaticon.com/128/1040/1040230.png",
      "https://cdn-icons-png.flaticon.com/128/1164/1164620.png", "https://cdn-icons-png.flaticon.com/128/3069/3069172.png",
      "https://cdn-icons-png.flaticon.com/128/806/806542.png"
    ];
    const EMOTICONS = { '(L)': '❤️', '(Y)': '👍', '(N)': '👎', '(A)': '😇', '(H)': '😎', '(K)': '💋', '(G)': '🎁', '(F)': '🌹', '(S)': '🌙', '(W)': '🌻' };

    // SONIDOS LOCALES (Descargados para mayor estabilidad)
    const NUDGE_URL = "./nudge.mp3";
    const MSG_URL = "./message.mp3";

    let sndNudge = new Audio(NUDGE_URL);
    let sndMsg = new Audio(MSG_URL);
    sndNudge.preload = 'auto';
    sndMsg.preload = 'auto';

    // Sintetizador de audio de respaldo en caso de que el MP3 local falle
    function playSyntheticDing() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';

        // Simular el clásico "Da-ding" de notificación
        osc.frequency.setValueAtTime(740, ctx.currentTime);     // F#5
        osc.frequency.setValueAtTime(932, ctx.currentTime + 0.1); // A#5

        gain.gain.setValueAtTime(0, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.05);
        gain.gain.linearRampToValueAtTime(0.0, ctx.currentTime + 0.3);

        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.3);
      } catch (e) { }
    }

    function playNudgeSound() {
      try {
        if (!sndNudge) sndNudge = new Audio(NUDGE_URL);
        sndNudge.currentTime = 0;
        let p = sndNudge.play();
        if (p !== undefined) p.catch(e => console.warn("Nudge Error:", e));
      } catch (e) { }
    }

    function playMsgSound() {
      try {
        if (!sndMsg) sndMsg = new Audio(MSG_URL);
        sndMsg.currentTime = 0;
        let p = sndMsg.play();
        if (p !== undefined) {
          p.catch(e => {
            console.warn("Msg Error (Fallback a sintético):", e);
            playSyntheticDing();
          });
        }
      } catch (e) { playSyntheticDing(); }
    }

    function testAudio() {
      playMsgSound();
      setTimeout(() => alert("Se reprodujo el sonido Mnsaje Nuevo. Si no lo has escuchado, revisa tu volumen o los permisos del navegador."), 500);
    }

    let lastMsgCount = 0, myUsername = "Usuario", currentChat = "TODOS", isNudging = false, unreadUsers = new Set(), myStatus = "online", myStatusMsg = "", myMusic = "";
    const seenNudges = new Set(); // Para no re-reproducir zumbidos ya vistos

    function parseUser(raw) {
      if (!raw) return { name: '?', avatar: 'msn_icon.png', status: 'online', msg: '', music: '' };
      const parts = raw.split('|');
      return {
        name: parts[0],
        avatar: parts[1] || 'msn_icon.png',
        status: parts[2] || 'online',
        msg: parts[3] || '',
        music: parts[4] || ''
      };
    }
    function getMyIdent() {
      const savedAv = localStorage.getItem('msn_avatar_' + myUsername) || 'msn_icon.png';
      return `${myUsername}|${savedAv}|${myStatus}|${myStatusMsg}|${myMusic}`;
    }

    function descargarArchivo(url, nombre) {
      if (!url || url === "" || url === "undefined" || url === "#") {
        alert("El archivo aún se está procesando o el enlace es inválido.");
        return;
      }

      let downloadUrl = url;

      // Intentamos extraer el ID de Google Drive para forzar la descarga binaria nativa
      const match = url.match(/[-\w]{25,}/);
      if (match) {
        const fileId = match[0];
        // Convertir enlaces de Google Docs a formatos descargables físicos (Word, Excel)
        if (url.includes('docs.google.com/document/')) {
          downloadUrl = `https://docs.google.com/document/d/${fileId}/export?format=docx`;
        } else if (url.includes('docs.google.com/spreadsheets/')) {
          downloadUrl = `https://docs.google.com/spreadsheets/d/${fileId}/export?format=xlsx`;
        } else if (url.includes('docs.google.com/presentation/')) {
          downloadUrl = `https://docs.google.com/presentation/d/${fileId}/export/pptx`;
        } else if (url.includes('drive.google.com') || url.includes('docs.google.com/file/d/')) {
          // Utilizar la vista UC de Drive para forzar el encabezado de "Descarga" (Content-Disposition: attachment)
          downloadUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
        }
      }

      // Método más moderno y confiable para lanzar descargas sin que el bloqueador de popups lo estropee: 
      // Al ser URLs de Google formateadas con `export=download`, esto forzará la descarga en tu ordenador en lugar de abrir la web.
      const link = document.createElement('a');
      link.href = downloadUrl;
      link.target = '_top'; // Previene bloqueos de iframe
      link.style.display = 'none';
      if (nombre) link.download = nombre;

      document.body.appendChild(link);
      link.click();
      setTimeout(() => document.body.removeChild(link), 1000);
    }

    function toggleMusic() {
      const inp = document.getElementById('musicInput');
      const btn = document.getElementById('btnMusic');
      if (inp.style.display === 'block') {
        inp.style.display = 'none'; btn.classList.remove('active');
        myMusic = ""; updatePresence();
      } else {
        inp.style.display = 'block'; inp.focus(); btn.classList.add('active');
      }
    }
    function saveMusic() {
      myMusic = document.getElementById('musicInput').value;
      if (!myMusic) { document.getElementById('musicInput').style.display = 'none'; document.getElementById('btnMusic').classList.remove('active'); }
      updatePresence();
    }
    function changeStatus() {
      myStatus = document.getElementById('statusSelect').value;
      const dot = document.getElementById('statusDot');
      dot.style.background = myStatus === 'online' ? '#10b981' : (myStatus === 'busy' ? '#ef4444' : '#f97316');
      updatePresence();
    }
    function updatePresence() {
      myStatusMsg = document.getElementById('personalMsg').value;
      // Usar texto explícito [PRESENCE_SYNC] para que TODOS los clientes lo descarguen y actualicen tu estado de conexión
      callApi('enviarMensaje', { usuario: getMyIdent(), texto: '[PRESENCE_SYNC]', tipo: 'status_update', receptor: 'TODOS' });
    }
    function processEmoticons(text) {
      let t = text;
      Object.keys(EMOTICONS).forEach(code => {
        const regex = new RegExp(code.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'), 'gi');
        t = t.replace(regex, EMOTICONS[code]);
      });
      return t;
    }
    function openGallery() {
      const grid = document.getElementById('avatarGrid'); grid.innerHTML = '';
      AVATARS.forEach(url => {
        const img = document.createElement('img'); img.src = url; img.className = 'avatar-option';
        img.onclick = () => selectAvatar(url); grid.appendChild(img);
      });
      document.getElementById('avatarGallery').style.display = 'block';
      document.getElementById('overlay').style.display = 'block';
    }
    function uploadCustomAvatar(input) {
      if (!input.files || !input.files[0]) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        selectAvatar(e.target.result);
        input.value = ''; // Reset para permitir subir la misma foto si se desea
        closeGallery();
      };
      reader.readAsDataURL(input.files[0]);
    }
    function closeGallery() { document.getElementById('avatarGallery').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    function selectAvatar(url) {
      localStorage.setItem('msn_avatar_' + myUsername, url);
      document.getElementById('myAvatarImg').src = url;
      closeGallery(); updatePresence();
    }
    window.onload = () => {
      myUsername = sessionStorage.getItem('userName') || "Invitado";
      document.getElementById('selfName').innerText = myUsername;
      const savedAvatar = localStorage.getItem('msn_avatar_' + myUsername);
      if (savedAvatar) document.getElementById('myAvatarImg').src = savedAvatar;

      // Anunciar presencia inmediata al conectarse
      updatePresence();

      // Latido cada 2 minutos para mantener presencia (ventana servidor: 5 min)
      setInterval(updatePresence, 120000);

      // === DETECCIÓN DE INACTIVIDAD (Disponible/Ausente) ===
      let lastActivity = Date.now();
      const INACTIVO_MS = 5 * 60 * 1000; // 5 minutos sin actividad → Ausente
      function registrarActividad() {
        const wasAway = myStatus === 'away_auto';
        lastActivity = Date.now();
        if (wasAway) {
          // Restaurar estado activo solo si fue puesto en ausente automáticamente
          myStatus = 'online';
          document.getElementById('statusSelect').value = 'online';
          const dot = document.getElementById('statusDot');
          dot.style.background = '#10b981';
          updatePresence();
        }
      }
      document.addEventListener('mousemove', registrarActividad);
      document.addEventListener('keydown', registrarActividad);
      document.addEventListener('click', registrarActividad);

      setInterval(() => {
        if (Date.now() - lastActivity > INACTIVO_MS && myStatus === 'online') {
          myStatus = 'away_auto'; // Marcador interno para saber que fue automático
          document.getElementById('statusSelect').value = 'away';
          const dot = document.getElementById('statusDot');
          dot.style.background = '#f97316';
          updatePresence();
        }
      }, 30000); // Verificar cada 30 segundos
      // ======================================================

      // DESBLOQUEAR AUDIO AL PRIMER CLIC (Requerido por navegadores)
      document.body.addEventListener('click', () => {
        sndNudge.play().then(() => { sndNudge.pause(); sndNudge.currentTime = 0; }).catch(() => { });
        sndMsg.play().then(() => { sndMsg.pause(); sndMsg.currentTime = 0; }).catch(() => { });
        console.log("Audio unlocked");
      }, { once: true });

      loadMessages(); setInterval(loadMessages, 2500);
      document.getElementById('msgInput').addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });
    };
    async function callApi(action, data = {}) { try { const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, data }) }); return await response.json(); } catch (e) { return { success: false }; } }
    async function loadMessages() {
      const res = await callApi('obtenerMensajes', { usuarioActual: myUsername });
      if (res.success && res.data) {
        if (res.data.length > lastMsgCount) {
          const nuevos = res.data.slice(lastMsgCount);
          let hayMsgNuevo = false;
          let hayZumbidoNuevo = false;

          nuevos.forEach(m => {
            if (m[3] === 'status_update' || m[3] === 'login_ping' || String(m[2] || '').includes('[LOGIN_PING]')) return;
            const ui = parseUser(m[1]);
            const senderName = String(ui.name || '').trim().toUpperCase();
            const myName = String(myUsername || '').trim().toUpperCase();
            const chatPartner = String(currentChat || '').trim().toUpperCase();

            // Solo procesar sonidos si no es la primera carga (lastMsgCount > 0)
            if (lastMsgCount > 0) {
              if (senderName !== myName && senderName !== chatPartner && (m[4] || 'TODOS').trim().toUpperCase() === myName) {
                unreadUsers.add(ui.name);
              }
              if (senderName !== myName && m[3] !== 'zumbido' && ((m[4] || 'TODOS').trim().toUpperCase() === 'TODOS' || (m[4] || '').trim().toUpperCase() === myName)) {
                hayMsgNuevo = true;
              }
              if (m[3] === 'zumbido' && senderName !== myName && ((m[4] || 'TODOS').trim().toUpperCase() === 'TODOS' || (m[4] || '').trim().toUpperCase() === myName)) {
                const nudgeId = m[0] + ui.name;
                if (!seenNudges.has(nudgeId)) { seenNudges.add(nudgeId); hayZumbidoNuevo = true; }
              }
            }
          });
          // Limpiar notificaciones del chat activo si llegaron mensajes nuevos de él
          if (currentChat !== 'TODOS') unreadUsers.delete(currentChat);

          if (hayMsgNuevo) playMsgSound();
          if (hayZumbidoNuevo) triggerVisualNudge();

          // SOLO RENDERIZAR SI HAY MENSAJES NUEVOS PARA EVITAR "TEMBLORES"
          renderMessages(res.data);
          updateOnlineList(res.data);
          lastMsgCount = res.data.length;
        } else if (res.data.length < lastMsgCount) {
          // Si el chat se vació, también renderizar
          renderMessages(res.data);
          updateOnlineList(res.data);
          lastMsgCount = res.data.length;
        }
      }
    }
    function selectChat(user) {
      currentChat = user;
      unreadUsers.delete(user);
      const lbl = user === 'TODOS' ? '' : ` — Conversando con: ${user}`;
      document.getElementById('selfName').innerText = myUsername + lbl;
      // Forzar limpieza inmediata de la notificación al entrar al chat
      unreadUsers.delete(user); 
      // Forzar re-render inmediato para mostrar mensajes del chat seleccionado
      callApi('obtenerMensajes', { usuarioActual: myUsername }).then(res => {
        if (res.success && res.data) renderMessages(res.data);
      });
    }
    function updateOnlineList(msgs) {
      const list = document.getElementById('onlineList');
      const ahora = Date.now();
      const CINCO_MIN = 300000; // 5 minutos: ventana permisiva para heartbeats cada 2 min
      const activos = msgs.filter(m => (ahora - new Date(m[0]).getTime()) < CINCO_MIN);
      const uniqueUsers = {};
      activos.forEach(m => {
        const ui = parseUser(m[1]);
        // Ignorar entradas con nombre desconocido o vacío
        if (ui.name && ui.name !== '?' && ui.name !== myUsername) uniqueUsers[ui.name] = ui;
      });
      let html = `<div class="contact-item" onclick="selectChat('TODOS')" style="cursor:pointer; font-weight:bold; color:var(--msn-blue); margin-bottom:10px;">🌐 Chat General</div>`;
      Object.values(uniqueUsers).forEach(u => {
        const isUnread = unreadUsers.has(u.name);
        const color = u.status === 'busy' ? '#ef4444' : (u.status === 'away' ? '#f97316' : '#10b981');
        const statusLabel = u.status === 'busy' ? 'Ocupado' : (u.status === 'away' ? 'Ausente' : 'Disponible');
        const avatarSrc = u.avatar && u.avatar !== 'msn_icon.png' ? u.avatar : u.avatar || 'msn_icon.png';
        html += `
          <div class="contact-item ${isUnread ? 'has-new-msg' : ''}" style="cursor:pointer; flex-direction:column; align-items:flex-start; margin-bottom:12px; padding:4px; border-radius:6px; ${isUnread ? '' : 'background:transparent'};" onclick="selectChat('${u.name}')">
            <div style="display:flex; align-items:center; gap:5px; width:100%;">
              <div style="position:relative; flex-shrink:0;">
                <img src="${avatarSrc}" onerror="this.src='msn_icon.png'" style="width:32px; height:32px; border-radius:6px; border:1px solid white; outline:1px solid #ccc; object-fit:contain; background:#f0f0f0;">
                <span style="position:absolute; bottom:-2px; right:-2px; width:9px; height:9px; background:${color}; border-radius:50%; border:1.5px solid white;"></span>
              </div>
              <div style="flex:1; overflow:hidden;">
                <div style="font-weight:bold; font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#1e293b;">${u.name}</div>
                <div style="font-size:9px; color:#888; font-style:italic; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${statusLabel}</div>
              </div>
            </div>
            <div style="font-size:9px; color:#666; font-style:italic; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; width:100%; padding-left:37px; margin-top:1px;">${u.music ? '🎵 ' + u.music : (u.msg || '')}</div>
          </div>`;
      });
      list.innerHTML = html;
    }
    function renderMessages(msgs) {
      const h = document.getElementById('chatHistory'); h.innerHTML = '';
      const myName = String(myUsername || '').trim().toUpperCase();
      const chatPartner = String(currentChat || '').trim().toUpperCase();

      const filtrados = msgs.filter(m => {
        if (m[3] === 'status_update' || m[3] === 'login_ping' || String(m[2] || '').includes('[LOGIN_PING]')) return false;
        const e = String(parseUser(m[1]).name || '').trim().toUpperCase();
        const r = String(m[4] || 'TODOS').trim().toUpperCase();
        
        return currentChat === 'TODOS' ? r === 'TODOS' : (e === myName && r === chatPartner) || (e === chatPartner && r === myName);
      });
      filtrados.forEach(m => {
        const ui = parseUser(m[1]);
        const esPropio = ui.name === myUsername;
        const d = document.createElement('div');

        if (m[3] === 'zumbido') {
          d.className = 'msg-nudge';
          d.innerHTML = `⚠️ Zumbido de <strong>${ui.name}</strong>`;
        } else if (m[3] === 'file') {
          let fd = { nombre: 'Archivo', url: '' };
          const rawTexto = m[2] || '';
          try { fd = rawTexto.startsWith('{') ? JSON.parse(rawTexto) : { nombre: 'Archivo', url: rawTexto }; } catch (e) { fd.url = rawTexto; }
          const displayUrl = fd.url || '#';
          const fileName = fd.nombre || 'Archivo adjunto';
          d.className = `msg-entry ${esPropio ? 'msg-me' : 'msg-them'}`;
          d.innerHTML = `
            <div class="msg-avatar"><img src="${ui.avatar}" onerror="this.src='msn_icon.png'"></div>
            <div>
              <div class="msg-sender" style="font-size:10px; font-weight:bold; color:${esPropio ? '#1d4ed8' : '#1e293b'}; margin-bottom:2px;">${ui.name}${ui.msg ? '<br><span style="font-weight:normal; font-style:italic; color:#888;">' + ui.msg + '</span>' : ''}</div>
              <div class="msg-text">
                <div style="margin-top:4px; background:#fff; border:1px solid #ddd; padding:6px; border-radius:6px; display:flex; align-items:center; gap:8px;">
                  <span style="font-size:18px;">📄</span>
                  <div style="flex:1; overflow:hidden;">
                    <span style="font-size:10px; font-weight:bold;">${fileName}</span><br>
                    <a href="${displayUrl !== '#' ? displayUrl : 'javascript:void(0)'}" target="_blank" style="font-size:9px; color:#004b91;">Ver en línea</a>
                  </div>
                  <button onclick="descargarArchivo('${displayUrl}', '${fileName}')" style="background:#004b91; color:white; border:none; padding:3px 8px; font-size:9px; border-radius:4px; cursor:pointer;">💾</button>
                </div>
              </div>
            </div>`;
        } else {
          d.className = `msg-entry ${esPropio ? 'msg-me' : 'msg-them'}`;
          d.innerHTML = `
            <div class="msg-avatar"><img src="${ui.avatar}" onerror="this.src='msn_icon.png'"></div>
            <div>
              <div class="msg-sender" style="font-size:10px; font-weight:bold; color:${esPropio ? '#1d4ed8' : '#374151'}; margin-bottom:2px;">${ui.name}${ui.msg ? '<br><span style="font-weight:normal; font-style:italic; color:#888; font-size:9px;">' + ui.msg + '</span>' : ''}</div>
              <div class="msg-text">${processEmoticons(m[2] || '')}</div>
            </div>`;
        }
        h.appendChild(d);
      });
      h.scrollTop = h.scrollHeight;
    }
    async function manejarArchivo(input) {
      const file = input.files[0]; if (!file || file.size > 10 * 1024 * 1024) return;
      const btn = document.querySelector('button[onclick*="fileInput"]'); btn.innerHTML = "⏳..."; btn.disabled = true;
      const reader = new FileReader(); reader.onload = async (e) => {
        await callApi('enviarMensaje', { usuario: getMyIdent(), texto: JSON.stringify({ nombre: file.name, url: "" }), tipo: 'file', receptor: currentChat, archivo: { nombre: file.name, base64: e.target.result.split(',')[1], mimeType: file.type } });
        btn.innerHTML = "📎"; btn.disabled = false; input.value = ""; loadMessages();
      }; reader.readAsDataURL(file);
    }
    async function sendMsg() { const i = document.getElementById('msgInput'), t = i.value.trim(); if (!t) return; i.value = ''; await callApi('enviarMensaje', { usuario: getMyIdent(), texto: t, tipo: 'msg', receptor: currentChat }); loadMessages(); }
    async function sendNudge() { if (isNudging) return; isNudging = true; await callApi('enviarMensaje', { usuario: getMyIdent(), texto: 'ZUMBIDO', tipo: 'zumbido', receptor: currentChat }); triggerVisualNudge(); setTimeout(() => isNudging = false, 5000); }
    async function vaciarChat() { 
      if (!confirm("¿Deseas vaciar el historial de este chat? Esta acción no se puede deshacer.")) return; 
      const res = await callApi('vaciarChat', { yo: myUsername, destinatario: currentChat }); 
      if(res.success) {
        lastMsgCount = 0; 
        document.getElementById('chatHistory').innerHTML = '<div style="text-align:center; color:#999; font-size:10px; padding:10px;">Chat vaciado exitosamente</div>';
        // Volver a anunciar presencia para no perder la imagen en el servidor
        updatePresence();
        loadMessages(); 
      } else {
        alert("No se pudo vaciar el chat. Intenta de nuevo.");
      }
    }
    function triggerVisualNudge() { 
      const w = document.getElementById('msnWindow'); 
      playNudgeSound(); 
      
      // Vibración física para celulares (Android)
      if ("vibrate" in navigator) {
        navigator.vibrate([200, 100, 200, 100, 200]);
      }

      w.classList.add('nudge-vibration', 'nudge-flash'); 
      setTimeout(() => w.classList.remove('nudge-vibration', 'nudge-flash'), 1000); 
    }
  </script>
</body>
