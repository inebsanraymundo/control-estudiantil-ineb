<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Messenger Retro - Control Estudiantil</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="msn_icon.png" type="image/png">
  <style>
    :root {
      --msn-blue: #004b91;
      --msn-light: #e1eefc;
      --msn-border: #82a9d8;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f0f0f0;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .msn-container {
      width: 100%;
      height: 100%;
      max-width: 500px;
      max-height: 600px;
      background: white;
      border: 1px solid var(--msn-border);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
    }

    .msn-header {
      background: linear-gradient(to bottom, #7fb2e5 0%, #004b91 100%);
      color: white;
      padding: 5px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .user-info {
      padding: 10px;
      background: var(--msn-light);
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--msn-border);
    }

    .avatar-frame {
      width: 40px;
      height: 40px;
      border: 2px solid white;
      background: #ccc;
      overflow: hidden;
    }

    .avatar-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .user-name {
      font-weight: bold;
      color: var(--msn-blue);
      font-size: 14px;
    }

    .msn-main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Área de chat */
    .chat-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ccc;
    }

    .chat-history {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      background: white;
      font-size: 12px;
    }

    .msg-entry {
      margin-bottom: 6px;
      line-height: 1.4;
      color: #333;
      display: flex;
      align-items: flex-start;
      gap: 5px;
    }
    .msg-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: bold;
      color: white;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .msg-text { flex: 1; }

    .msg-nudge {
      background: #fff3f3;
      color: #d00;
      font-weight: bold;
      padding: 5px;
      border: 1px dashed #f00;
      margin: 5px 0;
      font-size: 11px;
    }

    .writing-area {
      height: 60px;
      padding: 5px;
      background: #fff;
      border-top: 1px solid #ccc;
    }

    .writing-area textarea {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      resize: none;
      font-size: 12px;
    }

    /* Barra lateral */
    .contacts-side {
      width: 120px;
      background: #fdfdfd;
      display: flex;
      flex-direction: column;
      padding: 5px;
    }

    .contacts-title {
      font-size: 11px;
      font-weight: bold;
      color: #666;
      margin-bottom: 5px;
      border-bottom: 1px solid #eee;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
      border-radius: 4px;
      transition: 0.2s;
      padding-left: 5px;
      font-size: 11px;
    }

    .contact-item:hover {
      background: #eee;
    }

    .contact-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
    }

    .has-new-msg {
      background: #ffd6a5 !important;
      font-weight: bold;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.6;
      }

      100% {
        opacity: 1;
      }
    }

    .footer-actions {
      padding: 5px 10px;
      background: #eee;
      display: flex;
      justify-content: flex-end;
      gap: 5px;
    }

    .btn-send {
      background: linear-gradient(to bottom, #fff 0%, #ccc 100%);
      border: 1px solid #999;
      padding: 4px 15px;
      font-size: 11px;
      cursor: pointer;
      border-radius: 3px;
    }

    .btn-nudge {
      background: white;
      border: 1px solid #ccc;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      border-radius: 3px;
    }

    /* Animaciones */
    .nudge-vibration {
      animation: nudge-anim 0.1s linear infinite;
    }

    @keyframes nudge-anim {
      0% {
        transform: translate(3px, 3px);
      }

      50% {
        transform: translate(-3px, -3px);
      }

      100% {
        transform: translate(3px, 3px);
      }
    }

    .nudge-flash {
      background-color: #ff000022 !important;
    }
  </style>
</head>

<body>

  <div id="msnWindow" class="msn-container">
    <div class="msn-header">
      <span style="display:flex; align-items:center; gap:6px;">
        <img src="msn_icon.png" style="width:18px; height:18px; object-fit:contain;" alt="MSN">
        <span style="font-size: 11px; font-weight: bold;">Messenger - Control Estudiantil</span>
      </span>
      <div style="display:flex; gap:5px; align-items:center;">
        <button id="btnInstall" onclick="installApp()" style="display:none; background:#10b981; color:white; border:none; padding:2px 8px; font-size:9px; border-radius:10px; cursor:pointer;">📥 Instalar App</button>
        <button id="btnSoundAuth" onclick="testSound()" style="background:#f97316; color:white; border:none; padding:2px 8px; font-size:9px; border-radius:10px; cursor:pointer;">🔊 Probar Sonido</button>
        <button onclick="vaciarChat()" style="background:#ef4444; color:white; border:none; padding:2px 8px; font-size:9px; border-radius:10px; cursor:pointer;" title="Limpiar chat activo">🗑️ Limpiar</button>
        <button onclick="window.close()" style="background:none; border:none; color:white; cursor:pointer; font-weight:bold; font-size:14px;">×</button>
      </div>
    </div>

    <!-- Aviso Modo App -->
    <div id="pwaNotice"
      style="background:#fff3cd; color:#856404; font-size:9px; padding:3px; text-align:center; border-bottom:1px solid #ffeeba;">
      💡 Tip: Ve a <b>⚙️ > Guardar y Compartir > Instalar</b> para verlo como App real. <span
        onclick="this.parentElement.style.display='none'"
        style="cursor:pointer; font-weight:bold; float:right; margin-right:5px;">[X]</span>
    </div>

    <div class="user-info">
      <div class="avatar-frame"><img src="msn_icon.png" alt="MSN"></div>
      <div>
        <div id="selfName" class="user-name">Cargando...</div>
        <div style="font-size: 10px; color: #10b981;">● Disponible</div>
      </div>
    </div>

    <div class="msn-main-layout">
      <div class="chat-side">
        <div id="chatHistory" class="chat-history"></div>
        <div class="writing-area">
          <textarea id="msgInput" placeholder="Escribe aquí..."></textarea>
        </div>
      </div>
      <div class="contacts-side">
        <div class="contacts-title">Online</div>
        <div id="onlineList"></div>
      </div>
    </div>

    <div class="footer-actions">
      <button class="btn-nudge" onclick="sendNudge()">🔔 Zumbido</button>
      <button class="btn-send" onclick="sendMsg()">Enviar</button>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw9htZRC8wxgmX-WJQqFbYMz3NU5XPi7GIaAT6nrJT9r3GF3CvGtCbg5kWobMzxYzwJ/exec";

    let lastMsgCount = 0;
    let myUsername = "Usuario";
    let currentChat = "TODOS";
    let isNudging = false;
    let unreadUsers = new Set();
    let deferredInstallPrompt = null;

    // --- REGISTRO PWA ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;
      document.getElementById('btnInstall').style.display = 'block';
    });
    async function installApp() {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      const { outcome } = await deferredInstallPrompt.userChoice;
      if (outcome === 'accepted') document.getElementById('btnInstall').style.display = 'none';
      deferredInstallPrompt = null;
    }

    // --- AUDIO (síntesis pura, sin dependencias externas) ---
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    function playNudgeSound() {
      try {
        const ctx = getAudioCtx();
        // Reproduce una secuencia de 3 tonos estilo MSN: do-mi-sol
        const notas = [523, 659, 784];
        notas.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.value = freq;
          const inicio = ctx.currentTime + i * 0.12;
          gain.gain.setValueAtTime(0.4, inicio);
          gain.gain.exponentialRampToValueAtTime(0.001, inicio + 0.1);
          osc.start(inicio);
          osc.stop(inicio + 0.12);
        });
      } catch(e) { console.error('Audio error:', e); }
    }
    async function testSound() {
      playNudgeSound();
      const btn = document.getElementById('btnSoundAuth');
      btn.style.background = "#10b981";
      btn.innerText = "🔊 Sonando!";
      setTimeout(() => { btn.style.background = "#f97316"; btn.innerText = "🔊 Probar Sonido"; }, 1500);
    }

    window.onload = () => {
      myUsername = sessionStorage.getItem('userName') || "Invitado";
      document.getElementById('selfName').innerText = myUsername;

      // Desbloquear AudioContext al primer click
      document.body.addEventListener('click', () => { getAudioCtx(); }, { once: true });

      loadMessages();
      setInterval(loadMessages, 2500);

      document.getElementById('msgInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
      });
    };

    async function callApi(action, data = {}) {
      try {
        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, data }) });
        return await response.json();
      } catch (e) { return { success: false }; }
    }

    async function loadMessages() {
      const res = await callApi('obtenerMensajes', { usuarioActual: myUsername });
      if (res.success && res.data) {
        if (res.data.length > lastMsgCount) {
          const nuevos = res.data.slice(lastMsgCount);
          nuevos.forEach(m => {
            const emisor = m[1];
            const receptor = m[4] || 'TODOS';
            if (emisor !== myUsername && emisor !== currentChat && receptor === myUsername) {
              unreadUsers.add(emisor);
            }
          });

          const lastMsg = res.data[res.data.length - 1];
          if (lastMsg && lastMsg[3] === 'zumbido') {
            const emisor = lastMsg[1];
            const receptor = lastMsg[4] || 'TODOS';
            if (emisor !== myUsername && (receptor === 'TODOS' || receptor === myUsername)) {
              triggerVisualNudge();
            }
          }
        }
        renderMessages(res.data);
        updateOnlineList(res.data);
        lastMsgCount = res.data.length;
      }
    }

    function selectChat(user) {
      currentChat = user;
      unreadUsers.delete(user);
      document.getElementById('selfName').innerText = myUsername + " > " + user;
      loadMessages();
    }

    function updateOnlineList(msgs) {
      const list = document.getElementById('onlineList');
      const ahora = Date.now();
      const TRES_MINUTOS = 180000;
      const usuariosActivos = msgs.filter(m => (ahora - new Date(m[0]).getTime()) < TRES_MINUTOS).map(m => m[1]);
      const users = [...new Set(usuariosActivos)].filter(u => u !== myUsername);

      let html = `<div class="contact-item" onclick="selectChat('TODOS')" style="cursor:pointer; font-weight:bold; color:var(--msn-blue); margin-bottom:5px;">🌐 Chat General</div>`;
      users.forEach(u => {
        const isUnread = unreadUsers.has(u);
        html += `<div class="contact-item ${isUnread ? 'has-new-msg' : ''}" style="cursor:pointer;" onclick="selectChat('${u}')"><div class="contact-status"></div> ${u}</div>`;
      });
      list.innerHTML = html;
    }

    // Colores para avatares de usuarios
    const USER_COLORS = ['#004b91','#10b981','#f97316','#8b5cf6','#ef4444','#0ea5e9','#d97706'];
    function getUserColor(name) {
      let hash = 0;
      for (let c of (name || '?')) hash = (hash * 31 + c.charCodeAt(0)) & 0xFFFFFF;
      return USER_COLORS[Math.abs(hash) % USER_COLORS.length];
    }

    function renderMessages(msgs) {
      const h = document.getElementById('chatHistory');
      h.innerHTML = '';
      const filtrados = msgs.filter(m => {
        const emisor = m[1], receptor = m[4] || 'TODOS';
        if (currentChat === 'TODOS') return receptor === 'TODOS';
        return (emisor === myUsername && receptor === currentChat) || (emisor === currentChat && receptor === myUsername);
      });
      filtrados.forEach(m => {
        const d = document.createElement('div');
        if (m[3] === 'zumbido') {
          d.className = 'msg-nudge';
          d.innerHTML = `⚠️ Zumbido de <strong>${m[1]}</strong>`;
        } else {
          d.className = 'msg-entry';
          const inicial = (m[1] || '?')[0].toUpperCase();
          const color = getUserColor(m[1]);
          d.innerHTML = `<div class="msg-avatar" style="background:${color}">${inicial}</div><div class="msg-text"><strong>${m[1]}:</strong> ${m[2]}</div>`;
        }
        h.appendChild(d);
      });
      h.scrollTop = h.scrollHeight;
    }

    async function sendMsg() {
      const i = document.getElementById('msgInput');
      const t = i.value.trim(); if (!t) return; i.value = '';
      await callApi('enviarMensaje', { usuario: myUsername, texto: t, tipo: 'msg', receptor: currentChat });
      loadMessages();
    }

    async function sendNudge() {
      if (isNudging) return; isNudging = true;
      await callApi('enviarMensaje', { usuario: myUsername, texto: 'ZUMBIDO', tipo: 'zumbido', receptor: currentChat });
      triggerVisualNudge();
      setTimeout(() => isNudging = false, 5000);
    }

    async function vaciarChat() {
      const msg = currentChat === 'TODOS' ? "¿Limpiar Chat General?" : `¿Limpiar chat con ${currentChat}?`;
      if (!confirm(msg)) return;
      const res = await callApi('vaciarChat', { yo: myUsername, destinatario: currentChat });
      if (res.success) { lastMsgCount = 0; loadMessages(); }
    }

    function triggerVisualNudge() {
      const w = document.getElementById('msnWindow');
      playNudgeSound();
      w.classList.add('nudge-vibration', 'nudge-flash');
      if (window.navigator.vibrate) window.navigator.vibrate([200, 100, 200]);
      setTimeout(() => w.classList.remove('nudge-vibration', 'nudge-flash'), 1000);
    }
  </script>
</body>

</html>
