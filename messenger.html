<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSN Messenger Retro</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --msn-blue: #004b91;
      --msn-light-blue: #e1e9f3;
      --msn-header-blue: #0056b3;
      --msn-border: #a2b1c1;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Tahoma', sans-serif;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .msn-container {
      width: 100%;
      height: 100%;
      background: var(--msn-light-blue);
      border: 1px solid var(--msn-border);
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .msn-header {
      background: linear-gradient(to bottom, #0078d7, #0056b3);
      color: white;
      padding: 4px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }

    .user-info {
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #c0cedd;
      background: linear-gradient(to bottom, #fcfdfe, #e1e9f3);
    }

    .avatar-frame {
      width: 48px;
      height: 48px;
      border: 2px solid white;
      box-shadow: 0 0 3px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      background: white;
    }

    .avatar-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .user-name {
      font-weight: bold;
      color: var(--msn-blue);
      font-size: 13px;
    }

    .msn-main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .chat-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 8px;
      background: white;
    }

    .chat-history {
      flex: 1;
      border: 1px solid var(--msn-border);
      background: white;
      overflow-y: auto;
      padding: 8px;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .writing-area {
      height: 60px;
      border: 1px solid var(--msn-border);
    }

    .writing-area textarea {
      width: 100%;
      height: 100%;
      border: none;
      resize: none;
      padding: 5px;
      font-family: inherit;
      outline: none;
      box-sizing: border-box;
    }

    .contacts-side {
      width: 120px;
      border-left: 1px solid var(--msn-border);
      background: #fbfcfe;
      padding: 5px;
      overflow-y: auto;
    }

    .contacts-title {
      font-weight: bold;
      font-size: 11px;
      color: #555;
      margin-bottom: 8px;
      border-bottom: 1px solid #eee;
    }

    .contact-item {
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .contact-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
    }

    .footer-actions {
      padding: 8px;
      display: flex;
      gap: 8px;
      background: #e1e9f3;
      border-top: 1px solid #c0cedd;
    }

    .btn-nudge,
    .btn-send {
      padding: 4px 12px;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 3px;
    }

    .btn-nudge {
      background: linear-gradient(to bottom, #fff, #e0e0e0);
      border: 1px solid #a0a0a0;
    }

    .btn-send {
      background: linear-gradient(to bottom, #86d26d, #4e9e36);
      color: white;
      border: 1px solid #3d7d2a;
      margin-left: auto;
    }

    /* Mensajes */
    .msg-entry {
      margin-bottom: 8px;
      display: flex;
      gap: 8px;
      align-items: flex-start;
      animation: fadeIn 0.3s forwards;
    }

    .msg-avatar {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-weight: bold;
      font-size: 10px;
      flex-shrink: 0;
    }

    .msg-text {
      background: #f1f5f9;
      padding: 5px 8px;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      word-break: break-word;
    }

    .has-new-msg {
      background: #fff3cd;
      animation: blink 1s infinite;
      padding: 2px;
      border-radius: 4px;
    }

    @keyframes blink {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }

      100% {
        opacity: 1;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-nudge {
      text-align: center;
      padding: 5px;
      background: #fff5f5;
      border: 1px dashed #feb2b2;
      color: #c53030;
      font-weight: bold;
      font-size: 11px;
      margin: 10px 0;
      border-radius: 4px;
    }

    /* Animación Zumbido */
    .nudge-vibration {
      animation: nudge-anim 0.08s infinite;
    }

    @keyframes nudge-anim {
      0% {
        transform: translate(3px, 3px);
      }

      50% {
        transform: translate(-3px, -3px);
      }

      100% {
        transform: translate(3px, 3px);
      }
    }

    .nudge-flash {
      background-color: #ff000022 !important;
    }
  </style>
</head>

<body>

  <div id="msnWindow" class="msn-container">
    <div class="msn-header">
      <span style="display:flex; align-items:center; gap:6px;">
        <img src="msn_icon.png" style="width:18px; height:18px; object-fit:contain;" alt="MSN">
        <span style="font-size: 11px; font-weight: bold;">Messenger - Control Estudiantil</span>
      </span>
      <div style="display:flex; gap:5px; align-items:center;">
        <button id="btnInstall" onclick="installApp()" style="display:none; background:#10b981; color:white; border:none; padding:2px 8px; font-size:9px; border-radius:10px; cursor:pointer;">📥 Instalar App</button>
        <!-- BOTÓN PROBAR SONIDO COMENTADO
        <button id="btnSoundAuth" onclick="testSound()" style="background:#f97316; color:white; border:none; padding:2px 8px; font-size:9px; border-radius:10px; cursor:pointer;">🔊 Probar Sonido</button>
        -->
        <button onclick="vaciarChat()" style="background:#ef4444; color:white; border:none; padding:2px 8px; font-size:9px; border-radius:10px; cursor:pointer;" title="Limpiar chat activo">🗑️ Limpiar</button>
        <button onclick="window.close()" style="background:none; border:none; color:white; cursor:pointer; font-weight:bold; font-size:14px;">×</button>
      </div>
    </div>

    <!-- Aviso Modo App -->
    <div id="pwaNotice"
      style="background:#fff3cd; color:#856404; font-size:9px; padding:3px; text-align:center; border-bottom:1px solid #ffeeba;">
      💡 Tip: Ve a <b>⚙️ > Guardar y Compartir > Instalar</b> para verlo como App real. <span
        onclick="this.parentElement.style.display='none'"
        style="cursor:pointer; font-weight:bold; float:right; margin-right:5px;">[X]</span>
    </div>

    <div class="user-info">
      <div class="avatar-frame"><img src="msn_icon.png" alt="MSN"></div>
      <div>
        <div id="selfName" class="user-name">Cargando...</div>
        <div style="font-size: 10px; color: #10b981;">● Disponible</div>
      </div>
    </div>

    <div class="msn-main-layout">
      <div class="chat-side">
        <div id="chatHistory" class="chat-history"></div>
        <div class="writing-area">
          <textarea id="msgInput" placeholder="Escribe aquí..."></textarea>
        </div>
      </div>
      <div class="contacts-side">
        <div class="contacts-title">Online</div>
        <div id="onlineList"></div>
      </div>
    </div>

    <div class="footer-actions">
      <input type="file" id="fileInput" style="display:none" onchange="manejarArchivo(this)">
      <button class="btn-nudge" onclick="document.getElementById('fileInput').click()" title="Enviar un archivo">📎 Archivo</button>
      <button class="btn-nudge" onclick="sendNudge()">🔔 Zumbido</button>
      <button class="btn-send" onclick="sendMsg()">Enviar</button>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw3iWphkvmtDuDTxS8Uy0UVVHV6EzWAvligf4wxXkKOQUIeBKivYLgJ6cdthFUoBG8_/exec";
    
    // --- SONIDOS ORIGINALES ---
    const sndNudge = new Audio("https://cdn.jsdelivr.net/gh/HoussemBahri/MSN-Messenger-Clone/src/assets/sounds/nudge.mp3");
    const sndMsg = new Audio("https://cdn.jsdelivr.net/gh/HoussemBahri/MSN-Messenger-Clone/src/assets/sounds/message.mp3");
    
    function playNudgeSound() {
      sndNudge.currentTime = 0;
      sndNudge.play().catch(e => console.log('Audio blocked', e));
    }
    
    function playMsgSound() {
      sndMsg.currentTime = 0;
      sndMsg.play().catch(e => console.log('Audio blocked', e));
    }

    let lastMsgCount = 0;
    let myUsername = "Usuario";
    let currentChat = "TODOS";
    let isNudging = false;
    let unreadUsers = new Set();
    let deferredInstallPrompt = null;

    // --- REGISTRO PWA ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;
      document.getElementById('btnInstall').style.display = 'block';
    });
    async function installApp() {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      const { outcome } = await deferredInstallPrompt.userChoice;
      if (outcome === 'accepted') document.getElementById('btnInstall').style.display = 'none';
      deferredInstallPrompt = null;
    }

    window.onload = () => {
      myUsername = sessionStorage.getItem('userName') || "Invitado";
      document.getElementById('selfName').innerText = myUsername;

      // Desbloquear audio al primer click
      document.body.addEventListener('click', () => { 
        sndNudge.play().then(() => { sndNudge.pause(); sndNudge.currentTime = 0; }).catch(()=>{});
        sndMsg.play().then(() => { sndMsg.pause(); sndMsg.currentTime = 0; }).catch(()=>{});
      }, { once: true });

      loadMessages();
      setInterval(loadMessages, 2500);

      document.getElementById('msgInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
      });
    };

    async function callApi(action, data = {}) {
      try {
        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, data }) });
        return await response.json();
      } catch (e) { return { success: false }; }
    }

    async function loadMessages() {
      const res = await callApi('obtenerMensajes', { usuarioActual: myUsername });
      if (res.success && res.data) {
        if (res.data.length > lastMsgCount) {
          const nuevos = res.data.slice(lastMsgCount);
          let hayMsgNuevo = false;
          nuevos.forEach(m => {
            const emisor = m[1];
            const receptor = m[4] || 'TODOS';
            if (emisor !== myUsername && emisor !== currentChat && receptor === myUsername) {
              unreadUsers.add(emisor);
            }
            if (emisor !== myUsername && m[3] !== 'zumbido') {
              if (receptor === 'TODOS' || receptor === myUsername) hayMsgNuevo = true;
            }
          });
          
          if (hayMsgNuevo) playMsgSound();

          const lastMsg = res.data[res.data.length - 1];
          if (lastMsg && lastMsg[3] === 'zumbido') {
            const emisor = lastMsg[1];
            const receptor = lastMsg[4] || 'TODOS';
            if (emisor !== myUsername && (receptor === 'TODOS' || receptor === myUsername)) {
              triggerVisualNudge();
            }
          }
        }
        renderMessages(res.data);
        updateOnlineList(res.data);
        lastMsgCount = res.data.length;
      }
    }

    function selectChat(user) {
      currentChat = user;
      unreadUsers.delete(user);
      document.getElementById('selfName').innerText = myUsername + " > " + user;
      loadMessages();
    }

    function updateOnlineList(msgs) {
      const list = document.getElementById('onlineList');
      const ahora = Date.now();
      const TRES_MINUTOS = 180000;
      const usuariosActivos = msgs.filter(m => (ahora - new Date(m[0]).getTime()) < TRES_MINUTOS).map(m => m[1]);
      const users = [...new Set(usuariosActivos)].filter(u => u !== myUsername);
      
      let html = `<div class="contact-item" onclick="selectChat('TODOS')" style="cursor:pointer; font-weight:bold; color:var(--msn-blue); margin-bottom:5px;">🌐 Chat General</div>`;
      users.forEach(u => {
        const isUnread = unreadUsers.has(u);
        html += `<div class="contact-item ${isUnread?'has-new-msg':''}" style="cursor:pointer;" onclick="selectChat('${u}')"><div class="contact-status"></div> ${u}</div>`;
      });
      list.innerHTML = html;
    }

    // Colores para avatares de usuarios
    const USER_COLORS = ['#004b91','#10b981','#f97316','#8b5cf6','#ef4444','#0ea5e9','#d97706'];
    function getUserColor(name) {
      let hash = 0;
      for (let c of (name || '?')) hash = (hash * 31 + c.charCodeAt(0)) & 0xFFFFFF;
      return USER_COLORS[Math.abs(hash) % USER_COLORS.length];
    }

    function renderMessages(msgs) {
      const h = document.getElementById('chatHistory');
      h.innerHTML = '';
      const filtrados = msgs.filter(m => {
        const emisor = m[1], receptor = m[4] || 'TODOS';
        if (currentChat === 'TODOS') return receptor === 'TODOS';
        return (emisor === myUsername && receptor === currentChat) || (emisor === currentChat && receptor === myUsername);
      });
      filtrados.forEach(m => {
        const d = document.createElement('div');
        if (m[3] === 'zumbido') {
          d.className = 'msg-nudge';
          d.innerHTML = `⚠️ Zumbido de <strong>${m[1]}</strong>`;
        } else if (m[3] === 'file') {
          d.className = 'msg-entry';
          const inicial = (m[1] || '?')[0].toUpperCase();
          const color = getUserColor(m[1]);
          let fileData = { nombre: 'Archivo', url: m[2] };
          try { if(m[2].startsWith('{')) fileData = JSON.parse(m[2]); } catch(e){}
          
          d.innerHTML = `
            <div class="msg-avatar" style="background:${color}">${inicial}</div>
            <div class="msg-text">
              <strong>${m[1]}:</strong> ha enviado un archivo:
              <div style="background:#f1f5f9; border:1px solid #cbd5e1; padding:8px; border-radius:8px; margin-top:5px; display:flex; align-items:center; gap:10px;">
                <span style="font-size:18px;">📄</span>
                <div style="flex:1; overflow:hidden">
                  <div style="font-weight:bold; font-size:10px; white-space:nowrap; text-overflow:ellipsis; overflow:hidden;">${fileData.nombre}</div>
                  <a href="${fileData.url}" target="_blank" style="font-size:9px; color:#2563eb; text-decoration:none;">📥 Descargar</a>
                </div>
              </div>
            </div>`;
        } else {
          d.className = 'msg-entry';
          const inicial = (m[1] || '?')[0].toUpperCase();
          const color = getUserColor(m[1]);
          d.innerHTML = `<div class="msg-avatar" style="background:${color}">${inicial}</div><div class="msg-text"><strong>${m[1]}:</strong> ${m[2]}</div>`;
        }
        h.appendChild(d);
      });
      h.scrollTop = h.scrollHeight;
    }

    async function manejarArchivo(input) {
      if (!input.files || !input.files[0]) return;
      const file = input.files[0];
      if (file.size > 10 * 1024 * 1024) { alert("El archivo es muy grande (máx 10MB)"); return; }

      const btn = document.querySelector('button[onclick*="fileInput"]');
      const originalText = btn.innerHTML;
      btn.innerHTML = "⏳ Subiendo...";
      btn.disabled = true;

      const reader = new FileReader();
      reader.onload = async (e) => {
        const base64 = e.target.result.split(',')[1];
        const res = await callApi('enviarMensaje', { 
          usuario: myUsername, 
          texto: JSON.stringify({ nombre: file.name, url: "" }), 
          tipo: 'file', 
          receptor: currentChat,
          archivo: {
            nombre: file.name,
            base64: base64,
            mimeType: file.type
          }
        });
        
        btn.innerHTML = originalText;
        btn.disabled = false;
        input.value = "";
        loadMessages();
      };
      reader.readAsDataURL(file);
    }

    async function sendMsg() {
      const i = document.getElementById('msgInput');
      const t = i.value.trim(); if (!t) return; i.value = '';
      await callApi('enviarMensaje', { usuario: myUsername, texto: t, tipo: 'msg', receptor: currentChat });
      loadMessages();
    }

    async function sendNudge() {
      if (isNudging) return; isNudging = true;
      await callApi('enviarMensaje', { usuario: myUsername, texto: 'ZUMBIDO', tipo: 'zumbido', receptor: currentChat });
      triggerVisualNudge();
      setTimeout(() => isNudging = false, 5000);
    }

    async function vaciarChat() {
      const msg = currentChat === 'TODOS' ? "¿Limpiar Chat General?" : `¿Limpiar chat con ${currentChat}?`;
      if (!confirm(msg)) return;
      const res = await callApi('vaciarChat', { yo: myUsername, destinatario: currentChat });
      if (res.success) { lastMsgCount = 0; loadMessages(); }
    }

    function triggerVisualNudge() {
      const w = document.getElementById('msnWindow');
      playNudgeSound();
      w.classList.add('nudge-vibration', 'nudge-flash');
      if (window.navigator.vibrate) window.navigator.vibrate([200, 100, 200]);
      setTimeout(() => w.classList.remove('nudge-vibration', 'nudge-flash'), 1000);
    }
  </script>
</body>

</html>
