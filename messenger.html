<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INEB Messenger - Online</title>
  <style>
    :root {
      --msn-blue: #0055e0;
      --msn-light-blue: #eef3fa;
      --msn-header-grad: linear-gradient(to bottom, #0055e0, #3b82f6);
      --msn-border: #808080;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Tahoma', 'Segoe UI', sans-serif; }

    body {
      background: #c7d2fe;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Contenedor Principal */
    .msn-container {
      width: 520px;
      height: 520px;
      background: var(--msn-light-blue);
      border: 3px solid var(--msn-blue);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      box-shadow: 10px 10px 30px rgba(0,0,0,0.3);
    }

    .msn-header {
      background: var(--msn-header-grad);
      color: white;
      padding: 6px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .user-info {
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(to bottom, #ffffff, #eef3fa);
      border-bottom: 1px solid #ccc;
    }

    .avatar-frame { width: 45px; height: 45px; border: 2px solid #3b82f6; background: white; padding: 2px; }
    .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-weight: bold; color: #1e3a8a; font-size: 13px; }

    /* Layout MSN: Chat + Sidebar */
    .msn-main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      background: white;
      margin: 5px;
      border: 1px solid var(--msn-border);
    }

    .chat-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #eee;
    }

    .contacts-side {
      width: 140px;
      background: #fdfdfd;
      font-size: 11px;
      padding: 8px;
      overflow-y: auto;
    }

    .contacts-title { font-weight: bold; color: #1e3a8a; margin-bottom: 10px; }

    /* Estilos Chat */
    .chat-history {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .msg-entry strong { color: #0055e0; }
    .msg-nudge { color: #dc2626; font-weight: bold; text-align: center; padding: 8px; background: #fee2e2; border-radius: 5px; }

    .writing-area { padding: 10px; border-top: 1px solid #ccc; background: var(--msn-light-blue); }
    textarea { width: 100%; height: 50px; border: 1px solid var(--msn-border); padding: 5px; font-size: 12px; resize: none; outline: none; }

    .footer-actions { display: flex; justify-content: space-between; padding: 8px 10px 12px; }
    .btn-send { background: linear-gradient(to bottom, #f97316, #ea580c); color: white; border: 1px solid #c2410c; padding: 5px 15px; font-weight: bold; cursor: pointer; border-radius: 4px; }
    .btn-nudge { background: white; border: 1px solid #ccc; padding: 4px 8px; font-size: 11px; cursor: pointer; }

    /* Contactos */
    .contact-item { display: flex; align-items: center; gap: 6px; padding: 4px 0; border-radius: 4px; transition: 0.2s; padding-left: 5px; }
    .contact-item:hover { background: #eee; }
    .contact-status { width: 8px; height: 8px; border-radius: 50%; background: #10b981; }
    .has-new-msg { background: #ffd6a5 !important; font-weight: bold; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

    /* Animaciones */
    .nudge-vibration { animation: nudge 0.1s linear infinite; }
    @keyframes nudge {
      0% { transform: translate(3px, 3px); }
      50% { transform: translate(-3px, -3px); }
      100% { transform: translate(3px, 3px); }
    }
    .nudge-flash { background-color: #ff000022 !important; }

  </style>
</head>
<body>

  <div id="msnWindow" class="msn-container">
    <div class="msn-header">
      <span style="font-size: 11px; font-weight: bold;">Messenger - Control Docente</span>
      <div style="display:flex; gap:5px; align-items:center;">
        <button id="btnSoundAuth" onclick="this.style.display='none'" style="background:#f97316; color:white; border:none; padding:2px 8px; font-size:9px; border-radius:10px; cursor:pointer;">🔊 Activar Sonido</button>
        <button onclick="vaciarChat()" style="background:#ef4444; color:white; border:none; padding:2px 8px; font-size:9px; border-radius:10px; cursor:pointer;" title="Borrar todo el historial">🗑️ Limpiar</button>
        <button onclick="window.close()" style="background:none; border:none; color:white; cursor:pointer; font-weight:bold; font-size:14px;">×</button>
      </div>
    </div>

    <!-- Aviso Modo App -->
    <div id="pwaNotice" style="background:#fff3cd; color:#856404; font-size:9px; padding:3px; text-align:center; border-bottom:1px solid #ffeeba;">
      💡 Tip: Ve a <b>⚙️ > Guardar y Compartir > Instalar</b> para verlo como App real. <span onclick="this.parentElement.style.display='none'" style="cursor:pointer; font-weight:bold; float:right; margin-right:5px;">[X]</span>
    </div>

    <div class="user-info">
      <div class="avatar-frame"><img src="logo.png" alt="U"></div>
      <div>
        <div id="selfName" class="user-name">Cargando...</div>
        <div style="font-size: 10px; color: #10b981;">● Disponible</div>
      </div>
    </div>

    <div class="msn-main-layout">
      <div class="chat-side">
        <div id="chatHistory" class="chat-history"></div>
        <div class="writing-area">
          <textarea id="msgInput" placeholder="Escribe aquí..."></textarea>
        </div>
      </div>
      <div class="contacts-side">
        <div class="contacts-title">Online</div>
        <div id="onlineList"></div>
      </div>
    </div>

    <div class="footer-actions">
      <button class="btn-nudge" onclick="sendNudge()">🔔 Zumbido</button>
      <button class="btn-send" onclick="sendMsg()">Enviar</button>
    </div>
  </div>

  <audio id="nudgeAudio" preload="auto">
    <source src="https://raw.githubusercontent.com/HoussemBahri/MSN-Messenger-Clone/master/src/assets/sounds/nudge.mp3" type="audio/mpeg">
  </audio>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbw9htZRC8wxgmX-WJQqFbYMz3NU5XPi7GIaAT6nrJT9r3GF3CvGtCbg5kWobMzxYzwJ/exec";
    let lastMsgCount = 0;
    let myUsername = "Usuario";
    let currentChat = "TODOS";
    let isNudging = false;
    let unreadUsers = new Set();

    window.onload = () => {
      myUsername = sessionStorage.getItem('userName') || "Invitado";
      document.getElementById('selfName').innerText = myUsername;
      
      document.body.addEventListener('click', () => {
        const a = document.getElementById('nudgeAudio');
        a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(()=>{});
        if(document.getElementById('btnSoundAuth')) document.getElementById('btnSoundAuth').style.display='none';
      }, { once: true });

      loadMessages();
      setInterval(loadMessages, 2500); // Polling más rápido (2.5 seg)

      document.getElementById('msgInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
      });
    };

    async function callApi(action, data = {}) {
      try {
        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, data }) });
        return await response.json();
      } catch (e) { return { success: false }; }
    }

    async function loadMessages() {
      const res = await callApi('obtenerMensajes', { usuarioActual: myUsername });
      if (res.success && res.data) {
        
        // Detección de mensajes nuevos para notificaciones
        if (res.data.length > lastMsgCount) {
          const nuevos = res.data.slice(lastMsgCount);
          nuevos.forEach(m => {
            const emisor = m[1];
            const receptor = m[4] || 'TODOS';
            if (emisor !== myUsername && emisor !== currentChat && receptor === myUsername) {
              unreadUsers.add(emisor);
            }
          });
        }

        renderMessages(res.data);
        updateOnlineList(res.data);
        
        const lastMsg = res.data[res.data.length - 1];
        if(lastMsg && lastMsg[3] === 'zumbido' && res.data.length > lastMsgCount) {
           const emisor = lastMsg[1];
           const receptor = lastMsg[4] || 'TODOS';
           if (emisor !== myUsername && (receptor === 'TODOS' || receptor === myUsername)) {
             triggerVisualNudge();
           }
        }
        lastMsgCount = res.data.length;
      }
    }

    function selectChat(user) {
      currentChat = user;
      unreadUsers.delete(user);
      document.getElementById('selfName').innerText = myUsername + " > " + user;
      loadMessages();
    }

    function updateOnlineList(msgs) {
      const list = document.getElementById('onlineList');
      const ahora = new Date().getTime();
      const TRES_MINUTOS = 3 * 60 * 1000;
      
      const usuariosActivos = msgs
        .filter(m => (ahora - new Date(m[0]).getTime()) < TRES_MINUTOS)
        .map(m => m[1]);

      const users = [...new Set(usuariosActivos)].filter(u => u !== myUsername);
      
      let html = `<div class="contact-item ${currentChat==='TODOS'?'':'msg-unread'}" onclick="selectChat('TODOS')" style="cursor:pointer; font-weight:bold; color:var(--msn-blue); margin-bottom:5px;">🌐 Chat General</div>`;
      
      users.forEach(u => {
        const isUnread = unreadUsers.has(u);
        html += `<div class="contact-item ${isUnread?'has-new-msg':''}" style="cursor:pointer;" onclick="selectChat('${u}')">
                  <div class="contact-status"></div> ${u}
                 </div>`;
      });
      list.innerHTML = html;
    }

    function renderMessages(msgs) {
      const h = document.getElementById('chatHistory');
      h.innerHTML = '';
      
      const filtrados = msgs.filter(m => {
        const emisor = m[1];
        const receptor = m[4] || 'TODOS';
        if (currentChat === 'TODOS') return receptor === 'TODOS';
        return (emisor === myUsername && receptor === currentChat) || (emisor === currentChat && receptor === myUsername);
      });

      filtrados.forEach(m => {
        const d = document.createElement('div');
        d.className = m[3] === 'zumbido' ? 'msg-nudge' : 'msg-entry';
        d.innerHTML = m[3] === 'zumbido' ? `⚠️ Has recibido un zumbido.` : `<strong>${m[1]}:</strong> ${m[2]}`;
        h.appendChild(d);
      });
      h.scrollTop = h.scrollHeight;
    }

    async function sendMsg() {
      const i = document.getElementById('msgInput');
      const t = i.value.trim(); if (!t) return; i.value = '';
      await callApi('enviarMensaje', { usuario: myUsername, texto: t, tipo: 'msg', receptor: currentChat });
      loadMessages();
    }

    async function sendNudge() {
      if (isNudging) return; isNudging = true;
      await callApi('enviarMensaje', { usuario: myUsername, texto: 'ZUMBIDO', tipo: 'zumbido', receptor: currentChat });
      triggerVisualNudge();
      setTimeout(() => isNudging = false, 5000);
    }

    async function vaciarChat() {
      const msg = currentChat === 'TODOS' 
        ? "¿Seguro que quieres borrar todo el historial del CHAT GENERAL?" 
        : `¿Seguro que quieres borrar tu conversación privada con ${currentChat}?`;
      
      if (!confirm(msg)) return;
      
      const res = await callApi('vaciarChat', { 
        yo: myUsername, 
        destinatario: currentChat 
      });
      
      if (res.success) {
        lastMsgCount = 0;
        loadMessages();
      }
    }

    function triggerVisualNudge() {
      const w = document.getElementById('msnWindow');
      const a = document.getElementById('nudgeAudio');
      a.currentTime = 0; a.play().catch(()=>{});
      w.classList.add('nudge-vibration', 'nudge-flash');
      if (window.navigator.vibrate) window.navigator.vibrate([200, 100, 200]);
      setTimeout(() => w.classList.remove('nudge-vibration', 'nudge-flash'), 1000);
    }
  </script>
</body>
</html>
